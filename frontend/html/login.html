<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Login to your Mental Health Support System account — a safe space for your wellbeing.">
    <title>Login — Mental Health Support System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Decorative background blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card-wrapper">
        <!-- Left brand panel -->
        <div class="brand-panel">
            <div class="brand-logo">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <h1 class="brand-title">MindCare</h1>
            <p class="brand-subtitle">Your safe space for mental wellness and support</p>
            <ul class="brand-features">
                <li><i class="fa-solid fa-check-circle"></i> Confidential & Secure</li>
                <li><i class="fa-solid fa-check-circle"></i> 24/7 Support Access</li>
                <li><i class="fa-solid fa-check-circle"></i> Connect with Professionals</li>
            </ul>
        </div>

        <!-- Right login form panel -->
        <div class="form-panel">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue your wellness journey</p>
            </div>

            <form id="loginForm" action="/login" method="POST" novalidate>

                <!-- Username field -->
                <div class="input-group" id="usernameGroup">
                    <label for="username">Username or Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-circle-user input-icon"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username or email"
                            autocomplete="username" required>
                    </div>
                    <span class="error-msg" id="usernameError"></span>
                </div>

                <!-- Password field -->
                <div class="input-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password"
                            autocomplete="current-password" required>
                        <button type="button" class="toggle-password" id="togglePassword"
                            aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <!-- Remember me & Forgot password -->
                <div class="form-options">
                    <label class="remember-label">
                        <input type="checkbox" id="rememberMe" name="remember">
                        <span class="checkbox-custom"></span>
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                </div>

                <!-- Submit button -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <i class="fa-solid fa-arrow-right btn-icon"></i>
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Register link -->
                <p class="register-link">
                    Don't have an account? <a href="register.html">Create one — it's free</a>
                </p>

                <!-- Crisis help note -->
                <p class="crisis-note">
                    <i class="fa-solid fa-phone-volume"></i>
                    In crisis? Call <a href="tel:iCall">iCall: 9152987821</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/script.js"></script>
</body>

</html>
