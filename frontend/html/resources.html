<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../css/resources.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- =========================
         RESOURCES SECTION
    ========================== -->
    <div class="resources-container">

        <!-- FILTERS -->
        <div class="filters-section">
            <div class="filters-container">

                <div class="filter-group">
                    <label>Resource Type:</label>
                    <select id="type-filter" class="filter-select">
                        <option value="all">All Types</option>
                        <option value="videos">Videos</option>
                        <option value="audio">Audio</option>
                        <option value="posters">Posters</option>
                        <option value="guides">Guides</option>
                        <option value="books">Books</option>
                        <option value="quotes">Quotes</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Mood Tag:</label>
                    <select id="mood-filter" class="filter-select">
                        <option value="all">All Moods</option>
                        <option value="happy">Happy</option>
                        <option value="sad">Sad</option>
                        <option value="fear">Fear</option>
                        <option value="angry">Angry</option>
                        <option value="neutral">Neutral</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Search:</label>
                    <input type="text" id="search-filter" class="filter-input" placeholder="Search resources...">
                </div>

                <button id="clear-filters" class="clear-filters-btn">
                    ✖ Clear Filters
                </button>

            </div>
        </div>

        <!-- GRID -->
        <div id="resources-grid" class="resources-grid"></div>

        <!-- LOADING -->
        <div id="loading-indicator">Loading resources...</div>

        <!-- NO RESULTS -->
        <div id="no-results" style="display:none;">
            No resources found
        </div>

    </div>

    <!-- =========================
         MODAL (FULLSCREEN)
    ========================== -->
    <div class="resource-modal" id="resource-modal">
        <div class="modal-overlay" id="modal-overlay"></div>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <!-- JS -->
    <script src="../js/i18n.js"></script>
    <script src="../js/resources.js"></script>

</body>

</html>
