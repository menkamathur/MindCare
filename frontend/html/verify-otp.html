<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Verify OTP for MindCare password reset.">
    <title>Verify OTP — Mental Health Support System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card-wrapper">
        <div class="brand-panel">
            <div class="brand-logo"><i class="fa-solid fa-shield"></i></div>
            <h1 class="brand-title">MindCare</h1>
            <p class="brand-subtitle">Enter the one-time password sent to your selected recovery channel.</p>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h2>Verify OTP</h2>
                <p id="otpHint">Enter the 6-digit OTP</p>
            </div>

            <form id="verifyOtpForm" novalidate>
                <div class="input-group" id="otpGroup">
                    <label for="otp">OTP</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
                    </div>
                    <span class="error-msg" id="otpError"></span>
                </div>

                <button type="submit" class="btn-login" id="verifyOtpBtn">
                    <span class="btn-text">Verify OTP</span>
                    <i class="fa-solid fa-check btn-icon"></i>
                </button>

                <p class="register-link" style="margin-top: 1rem;">
                    Wrong method? <a href="forgot-password.html">Try again</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/verify-otp.js"></script>
</body>
</html>
