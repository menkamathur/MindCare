<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your MindCare password with OTP by email or phone.">
    <title>Forgot Password — Mental Health Support System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card-wrapper">
        <div class="brand-panel">
            <div class="brand-logo"><i class="fa-solid fa-key"></i></div>
            <h1 class="brand-title">MindCare</h1>
            <p class="brand-subtitle">Recover your account securely with one-time password verification.</p>
            <ul class="brand-features">
                <li><i class="fa-solid fa-check-circle"></i> Email OTP Support</li>
                <li><i class="fa-solid fa-check-circle"></i> Phone OTP Support</li>
                <li><i class="fa-solid fa-check-circle"></i> Secure Password Recovery</li>
            </ul>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h2>Forgot Password</h2>
                <p>Choose recovery method and get your OTP</p>
            </div>

            <form id="forgotForm" novalidate>
                <div class="input-group" id="channelGroup">
                    <label for="channel">Send OTP via</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-paper-plane input-icon"></i>
                        <input id="channel" list="channelOptions" placeholder="Choose email or phone" required>
                        <datalist id="channelOptions">
                            <option value="email"></option>
                            <option value="phone"></option>
                        </datalist>
                    </div>
                    <span class="error-msg" id="channelError"></span>
                </div>

                <div class="input-group" id="identifierGroup">
                    <label for="identifier">Email or Phone</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="identifier" placeholder="Enter your email or phone number" required>
                    </div>
                    <span class="error-msg" id="identifierError"></span>
                </div>

                <button type="submit" class="btn-login" id="sendOtpBtn">
                    <span class="btn-text">Send OTP</span>
                    <i class="fa-solid fa-arrow-right btn-icon"></i>
                </button>

                <p class="register-link" style="margin-top: 1rem;">
                    Remember password? <a href="login.html">Back to sign in</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/forgot-password.js"></script>
</body>
</html>
